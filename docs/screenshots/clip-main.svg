<svg width="1280" height="780" viewBox="0 0 1280 780" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Главный экран Clip</title>
  <desc id="desc">Демонстрационный скриншот главного экрана приложения Clip с полем ссылки, превью видео и настройками загрузки.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f7fb"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="thumb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c6ff2"/>
      <stop offset="1" stop-color="#2f8f83"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1d2433" flood-opacity=".12"/>
    </filter>
  </defs>

  <rect width="1280" height="780" rx="0" fill="url(#bg)"/>
  <rect x="40" y="34" width="1200" height="712" rx="22" fill="#ffffff" filter="url(#shadow)"/>

  <rect x="40" y="34" width="1200" height="74" rx="22" fill="#fbfbfe"/>
  <rect x="74" y="54" width="42" height="42" rx="12" fill="#eeeaff"/>
  <text x="87" y="82" font-family="Segoe UI, Arial" font-size="23" fill="#6f62e8">▶</text>
  <text x="132" y="70" font-family="Segoe UI, Arial" font-size="22" font-weight="700" fill="#202636">Clip</text>
  <text x="132" y="91" font-family="Segoe UI, Arial" font-size="13" fill="#6f7685">Готово к работе</text>
  <rect x="1050" y="58" width="140" height="30" rx="15" fill="#f0f3f8"/>
  <text x="1071" y="78" font-family="Segoe UI, Arial" font-size="13" fill="#596273">Нет загрузок</text>

  <rect x="74" y="132" width="1132" height="112" rx="16" fill="#ffffff" stroke="#e4e8f0"/>
  <text x="100" y="166" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#242938">Вставьте ссылку</text>
  <text x="100" y="190" font-family="Segoe UI, Arial" font-size="14" fill="#6a7280">YouTube, TikTok, Reddit и другие сайты, которые поддерживает yt-dlp.</text>
  <rect x="930" y="152" width="142" height="28" rx="14" fill="#f1efff"/>
  <circle cx="950" cy="166" r="4" fill="#7567f1"/>
  <text x="962" y="171" font-family="Segoe UI, Arial" font-size="12" fill="#5f57c8">YouTube</text>
  <rect x="100" y="204" width="750" height="42" rx="9" fill="#f7f8fb" stroke="#d9dee8"/>
  <text x="118" y="231" font-family="Segoe UI, Arial" font-size="14" fill="#8a92a1">https://youtube.com/watch?v=...</text>
  <rect x="866" y="204" width="104" height="42" rx="10" fill="#f2f4f8"/>
  <text x="895" y="231" font-family="Segoe UI, Arial" font-size="14" font-weight="600" fill="#2d3445">Вставить</text>
  <rect x="982" y="204" width="106" height="42" rx="10" fill="#7567f1"/>
  <text x="1010" y="231" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#ffffff">Анализ</text>

  <rect x="74" y="268" width="672" height="166" rx="16" fill="#ffffff" stroke="#e4e8f0"/>
  <rect x="100" y="292" width="210" height="118" rx="14" fill="url(#thumb)"/>
  <polygon points="184,327 184,375 224,351" fill="#ffffff" opacity=".92"/>
  <text x="338" y="315" font-family="Segoe UI, Arial" font-size="12" font-weight="700" letter-spacing="1.4" fill="#7a8190">ПРЕВЬЮ</text>
  <text x="338" y="345" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#232938">Название видео появится здесь</text>
  <text x="338" y="373" font-family="Segoe UI, Arial" font-size="14" fill="#687282">Автор, длительность и площадка подтянутся после анализа ссылки.</text>
  <rect x="338" y="390" width="86" height="28" rx="14" fill="#eeeaff"/>
  <text x="359" y="409" font-family="Segoe UI, Arial" font-size="12" fill="#5e55c9">YouTube</text>
  <rect x="434" y="390" width="82" height="28" rx="14" fill="#f2f4f8"/>
  <text x="454" y="409" font-family="Segoe UI, Arial" font-size="12" fill="#5f6879">12:48</text>

  <rect x="74" y="454" width="672" height="176" rx="16" fill="#ffffff" stroke="#e4e8f0"/>
  <text x="100" y="488" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#242938">Фрагмент видео</text>
  <text x="100" y="512" font-family="Segoe UI, Arial" font-size="14" fill="#6a7280">Можно скачать весь ролик или выбрать только нужный отрезок.</text>
  <text x="100" y="548" font-family="Segoe UI, Arial" font-size="12" font-weight="700" fill="#7a8190">НАЧАЛО</text>
  <line x1="100" y1="572" x2="700" y2="572" stroke="#d7ddea" stroke-width="7" stroke-linecap="round"/>
  <line x1="100" y1="572" x2="298" y2="572" stroke="#7567f1" stroke-width="7" stroke-linecap="round"/>
  <circle cx="298" cy="572" r="11" fill="#7567f1"/>
  <text x="100" y="606" font-family="Segoe UI, Arial" font-size="12" font-weight="700" fill="#7a8190">КОНЕЦ</text>
  <line x1="100" y1="626" x2="700" y2="626" stroke="#d7ddea" stroke-width="7" stroke-linecap="round"/>
  <line x1="100" y1="626" x2="574" y2="626" stroke="#2f8f83" stroke-width="7" stroke-linecap="round"/>
  <circle cx="574" cy="626" r="11" fill="#2f8f83"/>

  <rect x="770" y="268" width="436" height="250" rx="16" fill="#ffffff" stroke="#e4e8f0"/>
  <text x="796" y="302" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#242938">Файл</text>
  <text x="796" y="326" font-family="Segoe UI, Arial" font-size="14" fill="#6a7280">Выберите формат и максимальное качество.</text>
  <text x="796" y="362" font-family="Segoe UI, Arial" font-size="12" font-weight="700" fill="#7a8190">ФОРМАТ</text>
  <rect x="796" y="378" width="70" height="34" rx="10" fill="#7567f1"/>
  <text x="818" y="400" font-family="Segoe UI, Arial" font-size="13" font-weight="700" fill="#ffffff">MP4</text>
  <rect x="876" y="378" width="70" height="34" rx="10" fill="#f2f4f8"/>
  <text x="898" y="400" font-family="Segoe UI, Arial" font-size="13" fill="#394153">MP3</text>
  <rect x="956" y="378" width="86" height="34" rx="10" fill="#f2f4f8"/>
  <text x="976" y="400" font-family="Segoe UI, Arial" font-size="13" fill="#394153">WEBM</text>
  <text x="796" y="444" font-family="Segoe UI, Arial" font-size="12" font-weight="700" fill="#7a8190">КАЧЕСТВО</text>
  <rect x="796" y="460" width="74" height="34" rx="10" fill="#f2f4f8"/>
  <text x="815" y="482" font-family="Segoe UI, Arial" font-size="13" fill="#394153">1080p</text>
  <rect x="880" y="460" width="74" height="34" rx="10" fill="#7567f1"/>
  <text x="902" y="482" font-family="Segoe UI, Arial" font-size="13" font-weight="700" fill="#ffffff">720p</text>
  <rect x="964" y="460" width="74" height="34" rx="10" fill="#f2f4f8"/>
  <text x="986" y="482" font-family="Segoe UI, Arial" font-size="13" fill="#394153">480p</text>

  <rect x="770" y="538" width="436" height="92" rx="16" fill="#ffffff" stroke="#e4e8f0"/>
  <text x="796" y="572" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#242938">Готово к скачиванию?</text>
  <text x="796" y="596" font-family="Segoe UI, Arial" font-size="14" fill="#6a7280">Файл будет добавлен в очередь загрузок.</text>
  <rect x="1000" y="564" width="164" height="44" rx="12" fill="#7567f1"/>
  <text x="1028" y="592" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#ffffff">Добавить</text>

  <rect x="74" y="656" width="1132" height="54" rx="14" fill="#f7f8fb" stroke="#e4e8f0"/>
  <text x="100" y="688" font-family="Segoe UI, Arial" font-size="14" font-weight="700" fill="#242938">Загрузки</text>
  <text x="190" y="688" font-family="Segoe UI, Arial" font-size="14" fill="#6a7280">История</text>
  <text x="270" y="688" font-family="Segoe UI, Arial" font-size="14" fill="#6a7280">Настройки</text>
</svg>
